<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>RunTune</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="page-app">

  <!-- Header -->
  <header class="app-header">
    <div class="header-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="28" height="28">
        <circle cx="12" cy="12" r="12" fill="#1DB954"/>
        <g transform="translate(3, 2) scale(0.75)">
          <path fill="#fff" d="M13.49 5.48c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm-3.6 13.9l1-4.4 2.1 2v6h2v-7.5l-2.1-2 .6-3c1.3 1.5 3.3 2.5 5.5 2.5v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1l-5.2 2.2v4.7h2v-3.4l1.8-.7-1.6 8.1-4.9-1-.4 2 7 1.4z"/>
        </g>
      </svg>
      <span>RunTune</span>
    </div>
    <div class="header-right">
      <div class="user-avatar" id="user-avatar"></div>
      <a href="/auth/logout" class="btn-logout" title="Sair">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-view="input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <circle cx="12" cy="5" r="2"/>
        <path d="M10 9l-2 8 4-2 4 2-2-8"/>
        <path d="M6 20h12"/>
      </svg>
      <span>Treino</span>
    </button>
    <button class="nav-item" data-view="history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="22" height="22">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>Histórico</span>
    </button>
  </nav>

  <!-- ─── View: Input ─────────────────────────────────────────────────── -->
  <main id="view-input" class="view active">
    <div class="view-content">
      <div class="view-heading">
        <h2>Qual é o treino de hoje?</h2>
        <p class="text-muted" id="genres-label">Carregando seus gêneros...</p>
      </div>

      <form id="workout-form" class="workout-form" novalidate>
        <div class="form-group">
          <label for="distance">Distância</label>
          <div class="input-with-unit">
            <input
              type="number"
              id="distance"
              placeholder="10"
              min="1"
              max="200"
              inputmode="decimal"
              required
            />
            <span class="unit">km</span>
          </div>
        </div>

        <div class="form-group">
          <label>Tempo estimado</label>
          <div class="time-inputs">
            <div class="input-with-unit">
              <input
                type="number"
                id="hours"
                placeholder="0"
                min="0"
                max="24"
                inputmode="numeric"
              />
              <span class="unit">h</span>
            </div>
            <div class="input-with-unit">
              <input
                type="number"
                id="minutes"
                placeholder="45"
                min="0"
                max="60"
                inputmode="numeric"
              />
              <span class="unit">min</span>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label>Como estou me sentindo?</label>
          <div class="mood-options">
            <button type="button" class="mood-option" data-mood="motivated">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              <div class="mood-option-text">
                <strong>Estou motivado</strong>
                <span>Algo mais tranquilo para manter o ritmo</span>
              </div>
            </button>
            <button type="button" class="mood-option" data-mood="unmotivated">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
              <div class="mood-option-text">
                <strong>Não estou motivado, me ajude</strong>
                <span>Batida mais pesada para te animar</span>
              </div>
            </button>
            <button type="button" class="mood-option" data-mood="random">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
              <div class="mood-option-text">
                <strong>Tanto faz</strong>
                <span>Surpreenda-me</span>
              </div>
            </button>
          </div>
        </div>

        <div id="form-error" class="field-error hidden"></div>

        <button type="submit" class="btn-primary" id="search-btn">
          <span class="btn-text">Buscar álbuns</span>
          <span class="btn-spinner hidden">
            <svg class="spinner" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="20" height="20">
              <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
            </svg>
          </span>
        </button>
      </form>
    </div>
  </main>

  <!-- ─── View: Suggestions ──────────────────────────────────────────── -->
  <main id="view-suggestions" class="view hidden">
    <div class="view-content">
      <div class="suggestions-header">
        <button class="btn-back" id="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <path d="M19 12H5M12 5l-7 7 7 7"/>
          </svg>
        </button>
        <div>
          <h2>Seus álbuns</h2>
          <p class="text-muted" id="suggestions-subtitle"></p>
        </div>
      </div>

      <div id="suggestions-list" class="suggestions-list"></div>

      <button class="btn-ghost" id="retry-btn">Buscar novamente</button>
    </div>
  </main>

  <!-- ─── View: History ──────────────────────────────────────────────── -->
  <main id="view-history" class="view hidden">
    <div class="view-content">
      <div class="view-heading">
        <h2>Histórico</h2>
        <p class="text-muted">Seus treinos anteriores</p>
      </div>

      <div id="history-list"></div>

      <div id="history-empty" class="empty-state hidden">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
        <p>Nenhum treino registrado ainda.</p>
        <p class="text-muted">Complete seu primeiro treino e ele aparecerá aqui.</p>
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="/js/app.js"></script>
</body>
</html>
